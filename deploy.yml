name: CI/CD Bologna App

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JavaScript-Syntax pruefen
        run: |
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/app.js
          node --check /tmp/app.js
      - name: Keine Gedankenstriche im Text
        run: |
          if grep -q "—" index.html; then echo "Gedankenstrich gefunden" && exit 1; fi

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
